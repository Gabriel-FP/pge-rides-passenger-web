<main class="shell-content">
  <router-outlet />
</main>

<nav class="bottom-nav">
  @for (item of navItems; track item.route) {
  <a class="bottom-nav__item" [routerLink]="item.route" routerLinkActive="bottom-nav__item--active">
    <i [class]="item.icon"></i>
    <span>{{ item.label }}</span>
  </a>
  }
</nav>
