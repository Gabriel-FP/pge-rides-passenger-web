<div class="auth-page">
  <button type="button" class="auth-page__back" routerLink="/auth" aria-label="Go back">
    <i class="pi pi-chevron-left"></i>
  </button>

  <h1 class="auth-page__title">Enter the code</h1>
  <p class="auth-page__subtitle">We sent a 4-digit code to {{ maskedPhone() }}</p>

  <div class="otp-page">
    <app-otp-input [control]="codeControl" [length]="4" />
    @if (verifyError()) {
    <p class="otp-page__error">{{ verifyError() }}</p>
    }

    <p class="otp-page__resend">
      @if (canResend()) {
      <button type="button" class="otp-page__resend-link" (click)="resend()">Resend code</button>
      } @else {
      <span>Resend code in {{ secondsLeft() }}s</span>
      }
    </p>
  </div>

  <div class="auth-page__cta">
    <p-button label="Verify" styleClass="w-full" [loading]="isVerifying()" (onClick)="verify()" />
  </div>
</div>
